<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Audio to Tablature Converter</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,300;1,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/app-header.css">
</head>

<body>
    <header class="app-header" style="justify-content: center; background: transparent; border: none; padding-top: 2rem;">
        <div class="header-logo">
            <div class="header-logo-mark">
                <svg viewBox="0 0 16 16" fill="none">
                    <rect x="7" y="1" width="2" height="14" fill="#000" />
                    <circle cx="8" cy="4" r="2.5" fill="#000" />
                </svg>
            </div>
            <span class="header-wordmark">intab</span>
        </div>
    </header>

    <div class="app-container">
        <main class="login-content">
            <div class="glow glow-a"></div>
            <div class="glow glow-b"></div>

            <div class="card">
                <div class="card-eyebrow">Recovery</div>
                <h1 class="title">Forgot Password</h1>
                <p class="subtitle">Enter your email and we'll send you a reset link.</p>

                <div class="success-message alert" id="messageAlert" style="background: rgba(46, 213, 115, 0.1); border-color: rgba(46, 213, 115, 0.3); color: #2ed573;">
                    <span class="success-icon" style="color:#2ed573;">✓</span>
                    <span id="alertText">If an account with this email exists, a reset link has been sent.</span>
                </div>

                <form id="forgotForm" novalidate>
                    <div class="form-group" style="width: 100%;">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required>
                        <div class="error-message" id="emailError">Please enter a valid email address</div>
                    </div>

                    <button type="submit" class="btn-primary" id="submitBtn" style="margin-top: 1rem;">
                        <span class="btn-text">Send Reset Link</span>
                        <span class="btn-icon">→</span>
                    </button>
                </form>

                <div class="form-footer" style="margin-top: 2rem;">
                    Back to <a href="/login">Login</a>
                </div>
            </div>
        </main>
    </div>

    <script>
        const form = document.getElementById('forgotForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageAlert = document.getElementById('messageAlert');
        const alertText = document.getElementById('alertText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            if (!email) return;

            // Show loading state
            submitBtn.disabled = true;
            submitBtn.querySelector('.btn-text').textContent = 'Sending...';

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                
                if (response.ok) {
                    messageAlert.style.background = "rgba(46, 213, 115, 0.1)";
                    messageAlert.style.borderColor = "rgba(46, 213, 115, 0.3)";
                    messageAlert.style.color = "#2ed573";
                    messageAlert.querySelector('.success-icon').textContent = "✓";
                    messageAlert.querySelector('.success-icon').style.color = "#2ed573";
                } else {
                    messageAlert.style.background = "rgba(226, 33, 52, 0.1)";
                    messageAlert.style.borderColor = "rgba(226,33,52,0.3)";
                    messageAlert.style.color = "var(--error)";
                    messageAlert.querySelector('.success-icon').textContent = "!";
                    messageAlert.querySelector('.success-icon').style.color = "var(--error)";
                }

                alertText.textContent = data.message || (response.ok ? "Success!" : "Failed to send reset link.");
                messageAlert.classList.add('show');

            } catch (error) {
                console.error('Request error:', error);
                alertText.textContent = 'Something went wrong. Please try again.';
                messageAlert.classList.add('show');
            } finally {
                submitBtn.disabled = false;
                submitBtn.querySelector('.btn-text').textContent = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
