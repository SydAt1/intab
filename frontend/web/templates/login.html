<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Audio to Tablature Converter</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,300;1,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/app-header.css">
</head>

<body>
    <header class="app-header" style="justify-content: center; background: transparent; border: none; padding-top: 2rem;">
        <div class="header-logo">
            <div class="header-logo-mark">
                <svg viewBox="0 0 16 16" fill="none">
                    <rect x="7" y="1" width="2" height="14" fill="#000" />
                    <circle cx="8" cy="4" r="2.5" fill="#000" />
                </svg>
            </div>
            <span class="header-wordmark">intab</span>
        </div>
    </header>

    <div class="app-container">
        <aside id="sidebar-container"></aside>

        <main class="login-content">
            <!-- Ambient glow -->
            <div class="glow glow-a"></div>
            <div class="glow glow-b"></div>

            <div class="card">
                <div class="card-eyebrow">Welcome Back</div>
                <h1 class="title">Log In</h1>
                <p class="subtitle">Access your transcriptions</p>

                <div class="success-message alert" id="errorAlert" style="background: rgba(226, 33, 52, 0.1); border-color: rgba(226,33,52,0.3); color: var(--error);">
                    <span class="success-icon" style="color:var(--error);">!</span>
                    <span>Invalid credentials. Please try again.</span>
                </div>

                <form id="loginForm" novalidate>
                    <div class="form-group" style="width: 100%;">
                        <label for="email" class="form-label">Username</label>
                        <input type="text" id="email" name="email" class="form-input" placeholder="Enter your username" autocomplete="username" required>
                        <div class="error-message" id="emailError">Please enter your username</div>
                    </div>

                    <div class="form-group" style="width: 100%;">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-wrap">
                            <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
                            <button type="button" class="toggle-pw" aria-label="Show password" data-target="password">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                        <div class="error-message" id="passwordError">Please enter your password</div>
                    </div>

                    <div class="form-options" style="display: flex; justify-content: space-between; align-items: center; margin: 1.5rem 0 2rem;">
                        <label class="custom-checkbox" style="margin: 0;">
                            <input type="checkbox" id="remember" name="remember">
                            <span class="checkmark"></span>
                            <span class="checkbox-label" style="margin-top:2px;">Remember me</span>
                        </label>
                        <a href="/forgot-password" class="link-btn" style="text-decoration: none; font-size: 0.88rem;">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-primary" id="submitBtn">
                        <span class="btn-text">Log In</span>
                        <span class="btn-icon">→</span>
                    </button>
                </form>

                <div class="divider"><span>or</span></div>

                <div class="form-footer">
                    Don't have an account? <a href="/register">Sign up</a>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
        // ── Sidebar ──
        fetch('/sidenav')
            .then(r => { if (!r.ok) throw new Error(); return r.text(); })
            .then(html => {
                document.getElementById('sidebar-container').innerHTML = html;
                if (window.Auth && Auth.isAuthenticated()) Auth.updateSidebar();
            })
            .catch(() => {
                document.getElementById('sidebar-container').innerHTML = '';
            });

        // ── Password toggle ──
        document.querySelectorAll('.toggle-pw').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                input.type = input.type === 'password' ? 'text' : 'password';
                btn.classList.toggle('active');
            });
        });

        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorAlert = document.getElementById('errorAlert');
        const errorText = errorAlert.querySelector('span:last-child');

        // Form validation
        function validateForm() {
            let isValid = true;

            // Email/Username
            const email = document.getElementById('email');
            const emailError = document.getElementById('emailError');
            if (email.value.trim().length === 0) {
                email.classList.add('error');
                emailError.classList.add('show');
                isValid = false;
            } else {
                email.classList.remove('error');
                emailError.classList.remove('show');
            }

            // Password
            const password = document.getElementById('password');
            const passwordError = document.getElementById('passwordError');
            if (password.value.length === 0) {
                password.classList.add('error');
                passwordError.classList.add('show');
                isValid = false;
            } else {
                password.classList.remove('error');
                passwordError.classList.remove('show');
            }

            return isValid;
        }

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Hide previous errors
            errorAlert.classList.remove('show');

            if (!validateForm()) {
                return;
            }

            // Get form data
            const usernameInput = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            // Show loading state
            submitBtn.disabled = true;
            submitBtn.querySelector('.btn-text').textContent = 'Logging in…';

            try {
                // Call your login API - using username field directly as per your API
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: usernameInput,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Login successful - store auth data
                    Auth.setAuth(
                        data.access_token,
                        data.session_id,
                        data.user
                    );

                    // Store remember me preference
                    if (remember) {
                        localStorage.setItem('remember_me', 'true');
                        localStorage.setItem('remembered_username', usernameInput);
                    } else {
                        localStorage.removeItem('remember_me');
                        localStorage.removeItem('remembered_username');
                    }

                    const redirectUrl = sessionStorage.getItem('redirect_after_login');
                    sessionStorage.removeItem('redirect_after_login');

                    window.location.href = redirectUrl || '/fretboard';

                } else {
                    // Show error message
                    errorText.textContent = data.detail || 'Invalid username or password';
                    errorAlert.classList.add('show');

                    submitBtn.disabled = false;
                    submitBtn.querySelector('.btn-text').textContent = 'Log In';

                    // Clear password field
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (error) {
                console.error('Login error:', error);
                errorText.textContent = 'Unable to connect to server. Please try again.';
                errorAlert.classList.add('show');

                submitBtn.disabled = false;
                submitBtn.querySelector('.btn-text').textContent = 'Log In';
            }
        });

        // Real-time validation
        document.getElementById('email').addEventListener('input', function () {
            if (this.value.trim().length > 0) {
                this.classList.remove('error');
                document.getElementById('emailError').classList.remove('show');
                errorAlert.classList.remove('show');
            }
        });

        document.getElementById('password').addEventListener('input', function () {
            if (this.value.length > 0) {
                this.classList.remove('error');
                document.getElementById('passwordError').classList.remove('show');
                errorAlert.classList.remove('show');
            }
        });

        // Handle Enter key on password field
        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                form.dispatchEvent(new Event('submit'));
            }
        });

        // Auto-fill remembered username
        window.addEventListener('DOMContentLoaded', () => {
            const rememberedUsername = localStorage.getItem('remembered_username');
            const rememberMe = localStorage.getItem('remember_me');

            if (rememberMe === 'true' && rememberedUsername) {
                document.getElementById('email').value = rememberedUsername;
                document.getElementById('remember').checked = true;
                document.getElementById('password').focus();
            } else {
                document.getElementById('email').focus();
            }
        });

        // Check if user is already logged in
        if (typeof Auth !== 'undefined' && Auth.isAuthenticated()) {
            const redirectUrl = sessionStorage.getItem('redirect_after_login') || '/fretboard';
            sessionStorage.removeItem('redirect_after_login');
            window.location.href = redirectUrl;
        }
    </script>
</body>

</html>
