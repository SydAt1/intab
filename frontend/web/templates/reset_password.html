<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Audio to Tablature Converter</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,300;1,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/app-header.css">
</head>

<body>
    <header class="app-header" style="justify-content: center; background: transparent; border: none; padding-top: 2rem;">
        <div class="header-logo">
            <div class="header-logo-mark">
                <svg viewBox="0 0 16 16" fill="none">
                    <rect x="7" y="1" width="2" height="14" fill="#000" />
                    <circle cx="8" cy="4" r="2.5" fill="#000" />
                </svg>
            </div>
            <span class="header-wordmark">intab</span>
        </div>
    </header>

    <div class="app-container">
        <main class="login-content">
            <div class="glow glow-a"></div>
            <div class="glow glow-b"></div>

            <div class="card">
                <div class="card-eyebrow">Recovery</div>
                <h1 class="title">New Password</h1>
                <p class="subtitle">Set a strong, new password for your account.</p>

                <div class="success-message alert" id="messageAlert" style="background: rgba(46, 213, 115, 0.1); border-color: rgba(46, 213, 115, 0.3); color: #2ed573;">
                    <span class="success-icon" style="color:#2ed573;">✓</span>
                    <span id="alertText">Password changed successfully! Redirecting...</span>
                </div>

                <form id="resetForm" novalidate>
                    <div class="form-group" style="width: 100%;">
                        <label for="password" class="form-label">New Password</label>
                        <div class="input-wrap">
                            <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                            <button type="button" class="toggle-pw" aria-label="Show password" data-target="password">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-group" style="width: 100%;">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <div class="input-wrap">
                            <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" placeholder="••••••••" required>
                            <button type="button" class="toggle-pw" aria-label="Show password" data-target="confirmPassword">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                        <div class="error-message" id="confirmError">Passwords must match</div>
                    </div>

                    <button type="submit" class="btn-primary" id="submitBtn" style="margin-top: 1rem;">
                        <span class="btn-text">Reset Password</span>
                        <span class="btn-icon">→</span>
                    </button>
                </form>

                <div class="form-footer" style="margin-top: 2rem;">
                    Back to <a href="/login">Login</a>
                </div>
            </div>
        </main>
    </div>

    <script>
        const form = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageAlert = document.getElementById('messageAlert');
        const alertText = document.getElementById('alertText');

        // ── Password toggle ──
        document.querySelectorAll('.toggle-pw').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                input.type = input.type === 'password' ? 'text' : 'password';
                btn.classList.toggle('active');
            });
        });
        
        // Token passed from Jinja Template
        const token = "{{ token }}";

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const confirmError = document.getElementById('confirmError');

            if (password !== confirm) {
                confirmError.classList.add('show');
                return;
            } else {
                confirmError.classList.remove('show');
            }

            if (!password || !token) {
                alertText.textContent = "Token is missing. Please reload the page from the link in your email.";
                messageAlert.classList.add('show');
                return;
            };

            // Show loading state
            submitBtn.disabled = true;
            submitBtn.querySelector('.btn-text').textContent = 'Updating...';

            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        token: token,
                        new_password: password
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    messageAlert.style.background = "rgba(46, 213, 115, 0.1)";
                    messageAlert.style.borderColor = "rgba(46, 213, 115, 0.3)";
                    messageAlert.style.color = "#2ed573";
                    messageAlert.querySelector('.success-icon').textContent = "✓";
                    messageAlert.querySelector('.success-icon').style.color = "#2ed573";
                    
                    alertText.textContent = "Password changed successfully! Redirecting to login...";
                    messageAlert.classList.add('show');
                    
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    messageAlert.style.background = "rgba(226, 33, 52, 0.1)";
                    messageAlert.style.borderColor = "rgba(226,33,52,0.3)";
                    messageAlert.style.color = "var(--error)";
                    messageAlert.querySelector('.success-icon').textContent = "!";
                    messageAlert.querySelector('.success-icon').style.color = "var(--error)";
                    
                    alertText.textContent = data.detail || "Failed to reset password.";
                    messageAlert.classList.add('show');
                    submitBtn.disabled = false;
                    submitBtn.querySelector('.btn-text').textContent = 'Reset Password';
                }

            } catch (error) {
                console.error('Request error:', error);
                alertText.textContent = 'Something went wrong. Please try again.';
                messageAlert.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.querySelector('.btn-text').textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
