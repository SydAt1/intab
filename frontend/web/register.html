<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Tablature Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-black: #000000;
            --spotify-dark-grey: #121212;
            --spotify-light-grey: #282828;
            --spotify-text-main: #FFFFFF;
            --spotify-text-sub: #B3B3B3;
            --transition-smooth: all 0.4s cubic-bezier(0.3, 0, 0, 1);
            --error: #E22134;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Figtree', sans-serif;
            background: var(--spotify-black);
            color: var(--spotify-text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            position: relative;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 2rem;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-title {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--spotify-text-sub);
        }

        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar – exact match from previous pages */
        .sidebar {
            width: 85px;
            background-color: var(--spotify-black);
            padding: 1.5rem 0.75rem;
            display: flex;
            flex-direction: column;
            transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            height: 100%;
            overflow: hidden;
            flex-shrink: 0;
            z-index: 20;
        }

        .sidebar:hover {
            width: 260px;
        }

        .logo-container {
            margin-bottom: 2.5rem;
            padding-left: 0.5rem;
            display: flex;
            align-items: center;
        }

        .logo {
            width: 45px;
            height: 45px;
            background: var(--spotify-green);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: black;
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .nav-menu {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-item {
            padding: 0.8rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            color: var(--spotify-text-sub);
            text-decoration: none;
            transition: var(--transition-smooth);
            white-space: nowrap;
        }

        .nav-icon {
            font-size: 1.4rem;
            min-width: 28px;
            text-align: center;
        }

        .nav-text {
            opacity: 0;
            font-weight: 600;
            font-size: 0.95rem;
            transition: opacity 0.3s ease;
        }

        .sidebar:hover .nav-text {
            opacity: 1;
        }

        .nav-item:hover {
            color: var(--spotify-text-main);
            background: rgba(255, 255, 255, 0.08);
        }

        .nav-item.active {
            color: var(--spotify-text-main);
            background: var(--spotify-light-grey);
        }

        .nav-item.active .nav-icon {
            color: var(--spotify-green);
        }

        .user-profile {
            margin-top: auto;
            padding: 12px;
            background: var(--spotify-dark-grey);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .user-icon {
            width: 36px;
            height: 36px;
            background: #535353;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
            color: white;
        }

        .user-details {
            opacity: 0;
            transition: opacity 0.3s ease;
            overflow: hidden;
        }

        .sidebar:hover .user-details {
            opacity: 1;
        }

        .user-name {
            font-size: 0.85rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .user-status {
            font-size: 0.7rem;
            color: var(--spotify-green);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 800;
        }

        /* Signup Content */
        .signup-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-y: auto;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: var(--spotify-dark-grey);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 3rem 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        .header-logo {
            width: 80px;
            height: 80px;
            background: var(--spotify-green);
            border-radius: 16px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 900;
            color: black;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--spotify-text-sub);
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .form-group {
            margin-bottom: 1.6rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--spotify-text-main);
        }

        .form-input {
            width: 100%;
            padding: 0.9rem 1.1rem;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--spotify-green);
            box-shadow: 0 0 0 3px rgba(29, 185, 84, 0.2);
        }

        .form-input.error {
            border-color: var(--error);
        }

        .error-message {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 0.4rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            margin: 1.8rem 0;
        }

        .checkbox-input {
            width: 18px;
            height: 18px;
            accent-color: var(--spotify-green);
        }

        .checkbox-label {
            font-size: 0.9rem;
            color: var(--spotify-text-sub);
        }

        .checkbox-label a {
            color: var(--spotify-green);
            text-decoration: none;
        }

        .checkbox-label a:hover {
            text-decoration: underline;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: var(--spotify-green);
            color: black;
            border: none;
            border-radius: 500px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn-primary:hover {
            background: #1ed760;
            transform: scale(1.02);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .form-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--spotify-text-sub);
            font-size: 0.95rem;
        }

        .form-footer a {
            color: var(--spotify-green);
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .success-message {
            background: rgba(29, 185, 84, 0.15);
            border: 1px solid var(--spotify-green);
            color: var(--spotify-green);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 1.5rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 900px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100% !important;
                height: auto;
                flex-direction: row;
                padding: 1rem;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }

            .sidebar:hover {
                width: 100% !important;
            }

            .nav-menu {
                flex-direction: row;
                gap: 1.5rem;
                justify-content: center;
                flex: 1;
            }

            .user-profile {
                margin-top: 0;
                margin-left: auto;
            }
        }

        @media (max-width: 500px) {
            .card {
                padding: 2rem 1.5rem;
            }

            .title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="header-title">Tablature Intelligence</div>
    </header>

    <div class="app-container">
        <!-- Sidebar -->
        <aside id="sidebar-container"></aside>

        <main class="signup-content">
            <div class="card">
                <div class="header-logo">T</div>
                <h1 class="title">Create Account</h1>
                <p class="subtitle">Sign up to start transcribing</p>

                <div class="success-message" id="successMessage">
                    Account created! Redirecting to login...
                </div>

                <form id="signupForm">
                    <div class="form-group">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input type="text" id="fullName" class="form-input" placeholder="Enter your full name" required>
                        <div class="error-message" id="fullNameError">Please enter your full name</div>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                        <div class="error-message" id="emailError">Valid email required</div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                        <div class="error-message" id="passwordError">At least 6 characters</div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••" required>
                        <div class="error-message" id="confirmPasswordError">Passwords must match</div>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="terms" class="checkbox-input" required>
                        <label for="terms" class="checkbox-label">
                            I agree to the <a href="#">Terms</a> & <a href="#">Privacy Policy</a>
                        </label>
                    </div>

                    <button type="submit" class="btn-primary" id="submitBtn">Create Account</button>
                </form>

                <div class="form-footer">
                    Already have an account? <a href="login.html">Log in</a>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Load sidebar (same as other pages)
        fetch('sidenav.html')
            .then(r => {
                if (!r.ok) throw new Error('Sidebar load failed');
                return r.text();
            })
            .then(html => {
                document.getElementById('sidebar-container').innerHTML = html;

                // Update sidebar with user info
                if (window.Auth) Auth.updateSidebar();
            })
            .catch(err => {
                console.error(err);
                document.getElementById('sidebar-container').innerHTML =
                    '<div style="color:#f33; padding:2rem; text-align:center;">Sidebar unavailable</div>';
            });

        // ── Your existing form logic (slightly cleaned) ──
        const form = document.getElementById('signupForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMsg = document.getElementById('successMessage');

        function validateForm() {
            let valid = true;

            // Full name
            const name = document.getElementById('fullName');
            const nameErr = document.getElementById('fullNameError');
            if (name.value.trim().length < 2) {
                name.classList.add('error'); nameErr.classList.add('show'); valid = false;
            } else {
                name.classList.remove('error'); nameErr.classList.remove('show');
            }

            // Email
            const email = document.getElementById('email');
            const emailErr = document.getElementById('emailError');
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
                email.classList.add('error'); emailErr.classList.add('show'); valid = false;
            } else {
                email.classList.remove('error'); emailErr.classList.remove('show');
            }

            // Password
            const pw = document.getElementById('password');
            const pwErr = document.getElementById('passwordError');
            if (pw.value.length < 6) {
                pw.classList.add('error'); pwErr.classList.add('show'); valid = false;
            } else {
                pw.classList.remove('error'); pwErr.classList.remove('show');
            }

            // Confirm
            const cpw = document.getElementById('confirmPassword');
            const cpwErr = document.getElementById('confirmPasswordError');
            if (cpw.value !== pw.value) {
                cpw.classList.add('error'); cpwErr.classList.add('show'); valid = false;
            } else {
                cpw.classList.remove('error'); cpwErr.classList.remove('show');
            }

            return valid;
        }

        form.addEventListener('submit', async e => {
            e.preventDefault();
            if (!validateForm()) return;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating...';

            const data = {
                username: document.getElementById('email').value.split('@')[0],
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                full_name: document.getElementById('fullName').value
            };

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    successMsg.classList.add('show');
                    setTimeout(() => window.location.href = '/login.html', 1800);
                } else {
                    const err = await res.json();
                    alert(err.detail || 'Registration failed');
                }
            } catch (err) {
                alert('Network error – please try again');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });

        // Optional real-time feedback
        document.getElementById('confirmPassword')?.addEventListener('input', function () {
            const pw = document.getElementById('password').value;
            if (this.value && this.value !== pw) {
                this.classList.add('error');
                document.getElementById('confirmPasswordError').classList.add('show');
            } else {
                this.classList.remove('error');
                document.getElementById('confirmPasswordError').classList.remove('show');
            }
        });
    </script>
</body>

</html>
