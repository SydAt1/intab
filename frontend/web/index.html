<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio to Tablature | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-black: #000000;
            --spotify-dark-grey: #121212;
            --spotify-light-grey: #282828;
            --spotify-text-main: #FFFFFF;
            --spotify-text-sub: #B3B3B3;
            --transition-smooth: all 0.4s cubic-bezier(0.3, 0, 0, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Figtree', sans-serif;
            background-color: #000;
            color: var(--spotify-text-main);
            overflow: hidden;
            height: 100vh;
        }

        .header {
            position: relative;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 2rem;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-title {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--spotify-text-sub);
        }

        .app-container {
            display: flex;
            height: calc(100vh - 62px);
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            background: linear-gradient(to bottom, #1e1e1e 0%, #121212 50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hero {
            text-align: center;
            margin-bottom: 4rem;
            max-width: 800px;
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: var(--spotify-text-sub);
        }

        .features-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
        }

        .feature-card {
            background: var(--spotify-dark-grey);
            padding: 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            transition: var(--transition-smooth);
            position: relative;
            width: 260px;
            text-align: left;
        }

        .feature-card:hover {
            background: var(--spotify-light-grey);
            transform: translateY(-8px);
        }

        .feature-icon-box {
            width: 100%;
            aspect-ratio: 1/1;
            background: #222;
            border-radius: 8px;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .feature-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }

        .feature-desc {
            font-size: 0.85rem;
            color: var(--spotify-text-sub);
            line-height: 1.4;
        }

        .feature-card::after {
            content: '▶';
            position: absolute;
            right: 25px;
            bottom: 80px;
            width: 50px;
            height: 50px;
            background: var(--spotify-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-size: 1.2rem;
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition-smooth);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .feature-card:hover::after {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 900px) {
            .app-container {
                flex-direction: column;
            }

            .hero-title {
                font-size: 2.8rem;
            }

            .features-container {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="header-title">Tablature Intelligence</div>
    </header>

    <div class="app-container">
        <aside id="sidebar-container"></aside>

        <main class="main-content">
            <div class="hero">
                <h1 class="hero-title">Your sound, scripted.</h1>
                <p class="hero-subtitle">High-fidelity audio to guitar tablature transcription</p>
            </div>

            <div class="features-container">
                <a href="input-processing.html" class="feature-card">
                    <div class="feature-icon-box">🎵</div>
                    <h3 class="feature-title">Upload Audio</h3>
                    <p class="feature-desc">Transcribe MP3s or live recordings instantly.</p>
                </a>

                <a href="fretboard.html" class="feature-card">
                    <div class="feature-icon-box">🎸</div>
                    <h3 class="feature-title">Fretboard Lab</h3>
                    <p class="feature-desc">Interactive visualization of every note played.</p>
                </a>

                <a href="output-editing.html" class="feature-card">
                    <div class="feature-icon-box">📊</div>
                    <h3 class="feature-title">Edit & Export</h3>
                    <p class="feature-desc">Refine your tabs and export to PDF or MIDI.</p>
                </a>
            </div>
        </main>
    </div>

    <!-- Authentication Script - Must be loaded first -->
    <script src="/static/js/auth.js"></script>

    <script>
        // CRITICAL: Require authentication before showing page
        // This will redirect to /login.html if user is not authenticated
        Auth.requireLogin();

        // Load sidebar component
        fetch('sidenav.html')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Failed to load sidebar: ${response.status} ${response.statusText}`);
                }
                return response.text();
            })
            .then(html => {
                const container = document.getElementById('sidebar-container');
                container.innerHTML = html;

                // Highlight current page in navigation
                const currentPage = window.location.pathname.split('/').pop() || 'index.html';
                document.querySelectorAll('.nav-item').forEach(link => {
                    const href = link.getAttribute('href');
                    if (href === currentPage || (currentPage === '' && href === 'index.html')) {
                        link.classList.add('active');
                    }
                });

                // Update sidebar with user info
                Auth.updateSidebar();
            })
            .catch(err => {
                console.error('Sidebar loading error:', err);
                document.getElementById('sidebar-container').innerHTML =
                    `<div style="color:#f33; padding:2rem; text-align:center;">
                        Failed to load sidebar<br><small>${err.message}</small>
                    </div>`;
            });
    </script>
</body>

</html>
