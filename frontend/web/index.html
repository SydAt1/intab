<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio to Tablature | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="css/index.css">
</head>

<body>

    <header class="header">
        <div class="header-title">Tablature Intelligence</div>
    </header>

    <div class="app-container">
        <aside id="sidebar-container"></aside>

        <main class="main-content">
            <div class="hero">
                <h1 class="hero-title">Your sound, scripted.</h1>
                <p class="hero-subtitle">High-fidelity audio to guitar tablature transcription</p>
            </div>

            <div class="features-container">
                <a href="input-processing.html" class="feature-card">
                    <div class="feature-icon-box">🎵</div>
                    <h3 class="feature-title">Upload Audio</h3>
                    <p class="feature-desc">Transcribe MP3s or live recordings instantly.</p>
                </a>

                <a href="fretboard.html" class="feature-card">
                    <div class="feature-icon-box">🎸</div>
                    <h3 class="feature-title">Fretboard Lab</h3>
                    <p class="feature-desc">Interactive visualization of every note played.</p>
                </a>

                <a href="output-editing.html" class="feature-card">
                    <div class="feature-icon-box">📊</div>
                    <h3 class="feature-title">Edit & Export</h3>
                    <p class="feature-desc">Refine your tabs and export to PDF or MIDI.</p>
                </a>
            </div>
        </main>
    </div>

    <!-- Authentication Script - Must be loaded first -->
    <script src="/static/js/auth.js"></script>

    <script>
        // CRITICAL: Require authentication before showing page
        // This will redirect to /login.html if user is not authenticated
        Auth.requireLogin();

        // Load sidebar component
        fetch('sidenav.html')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Failed to load sidebar: ${response.status} ${response.statusText}`);
                }
                return response.text();
            })
            .then(html => {
                const container = document.getElementById('sidebar-container');
                container.innerHTML = html;

                // Highlight current page in navigation
                const currentPage = window.location.pathname.split('/').pop() || 'index.html';
                document.querySelectorAll('.nav-item').forEach(link => {
                    const href = link.getAttribute('href');
                    if (href === currentPage || (currentPage === '' && href === 'index.html')) {
                        link.classList.add('active');
                    }
                });

                // Update sidebar with user info
                Auth.updateSidebar();
            })
            .catch(err => {
                console.error('Sidebar loading error:', err);
                document.getElementById('sidebar-container').innerHTML =
                    `<div style="color:#f33; padding:2rem; text-align:center;">
                        Failed to load sidebar<br><small>${err.message}</small>
                    </div>`;
            });
    </script>
</body>

</html>
