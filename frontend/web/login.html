<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Audio to Tablature Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <!-- Floating particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">Tab</div>
                <h1 class="title">Login to Your Account</h1>
                <p class="subtitle">Enter your credentials to continue</p>
            </div>

            <div class="alert" id="errorAlert">
                Invalid credentials. Please try again.
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Username</label>
                    <input type="text" id="email" name="email" class="form-input" placeholder="Enter your username"
                        autocomplete="username" required>
                    <div class="error-message" id="emailError">Please enter your username</div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••"
                        autocomplete="current-password" required>
                    <div class="error-message" id="passwordError">Please enter your password</div>
                </div>

                <div class="form-options">
                    <div class="remember-group">
                        <input type="checkbox" id="remember" name="remember" class="checkbox-input">
                        <label for="remember" class="remember-label">Remember me</label>
                    </div>
                    <a href="/forgot-password" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">
                    <span class="btn-text">Login</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="form-footer">
                <span class="form-footer-text">Don't have an account?</span>
                <a href="/signup" class="form-footer-link">Register here</a>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorAlert = document.getElementById('errorAlert');

        // Form validation
        function validateForm() {
            let isValid = true;

            // Email/Username
            const email = document.getElementById('email');
            const emailError = document.getElementById('emailError');
            if (email.value.trim().length === 0) {
                email.classList.add('error');
                emailError.classList.add('show');
                isValid = false;
            } else {
                email.classList.remove('error');
                emailError.classList.remove('show');
            }

            // Password
            const password = document.getElementById('password');
            const passwordError = document.getElementById('passwordError');
            if (password.value.length === 0) {
                password.classList.add('error');
                passwordError.classList.add('show');
                isValid = false;
            } else {
                password.classList.remove('error');
                passwordError.classList.remove('show');
            }

            return isValid;
        }

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Hide previous errors
            errorAlert.classList.remove('show');

            if (!validateForm()) {
                return;
            }

            // Get form data
            const usernameInput = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            // Show loading state
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                // Call your login API - using username field directly as per your API
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: usernameInput,  // API expects 'username' field
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Login successful - store auth data
                    Auth.setAuth(
                        data.access_token,
                        data.session_id,
                        data.user
                    );

                    // Store remember me preference
                    if (remember) {
                        localStorage.setItem('remember_me', 'true');
                        // Store username for auto-fill on next visit
                        localStorage.setItem('remembered_username', usernameInput);
                    } else {
                        localStorage.removeItem('remember_me');
                        localStorage.removeItem('remembered_username');
                    }

                    // Check if there's a redirect URL stored (from requireAuth)
                    const redirectUrl = sessionStorage.getItem('redirect_after_login');
                    sessionStorage.removeItem('redirect_after_login');

                    // Redirect to intended page or default to fretboard
                    window.location.href = redirectUrl || '/fretboard.html';

                } else {
                    // Show error message
                    errorAlert.textContent = data.detail || 'Invalid username or password';
                    errorAlert.classList.add('show');

                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;

                    // Clear password field
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (error) {
                console.error('Login error:', error);
                errorAlert.textContent = 'Unable to connect to server. Please try again.';
                errorAlert.classList.add('show');

                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });

        // Real-time validation
        document.getElementById('email').addEventListener('input', function () {
            if (this.value.trim().length > 0) {
                this.classList.remove('error');
                document.getElementById('emailError').classList.remove('show');
                errorAlert.classList.remove('show');
            }
        });

        document.getElementById('password').addEventListener('input', function () {
            if (this.value.length > 0) {
                this.classList.remove('error');
                document.getElementById('passwordError').classList.remove('show');
                errorAlert.classList.remove('show');
            }
        });

        // Handle Enter key on password field
        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });

        // Auto-fill remembered username
        window.addEventListener('DOMContentLoaded', () => {
            const rememberedUsername = localStorage.getItem('remembered_username');
            const rememberMe = localStorage.getItem('remember_me');

            if (rememberMe === 'true' && rememberedUsername) {
                document.getElementById('email').value = rememberedUsername;
                document.getElementById('remember').checked = true;
                document.getElementById('password').focus();
            } else {
                document.getElementById('email').focus();
            }
        });

        // Check if user is already logged in
        if (Auth.isAuthenticated()) {
            // Already logged in, redirect to app
            const redirectUrl = sessionStorage.getItem('redirect_after_login') || '/fretboard.html';
            sessionStorage.removeItem('redirect_after_login');
            window.location.href = redirectUrl;
        }
    </script>
</body>

</html>
