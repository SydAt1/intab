<script>
    (function () {
        // Set active navigation item based on current page
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        const navItems = document.querySelectorAll('.nav-item');

        navItems.forEach(item => {
            const href = item.getAttribute('href');
            if (href === currentPage || (currentPage === '' && href === 'index.html')) {
                item.classList.add('active');
            }
        });

        // Fetch user data from session/API
        async function loadUserData() {
            try {
                // Get session ID from localStorage
                const sessionId = localStorage.getItem('session_id');
                const token = localStorage.getItem('access_token');

                if (!sessionId && !token) {
                    // No session - show guest user
                    showGuestUser();
                    return;
                }

                // Call /me endpoint to get user data
                const response = await fetch('/me', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to fetch user data');
                }

                const userData = await response.json();
                updateUserProfile(userData);

            } catch (error) {
                console.error('Error loading user data:', error);
                showGuestUser();
            }
        }

        // Update user profile UI
        function updateUserProfile(user) {
            const userName = document.getElementById('userName');
            const userStatus = document.getElementById('userStatus');
            const userIcon = document.getElementById('userIcon');

            // Set user name
            userName.textContent = user.username || user.email?.split('@')[0] || 'User';

            // Set status (you can customize based on user.subscription_type or similar)
            userStatus.textContent = user.is_premium ? 'Premium' : 'Free';

            // Set icon (first letter of username)
            const initial = (user.username || user.email || 'U')[0].toUpperCase();
            userIcon.textContent = initial;

            // Store user data for other pages
            localStorage.setItem('user_data', JSON.stringify(user));
        }

        // Show guest user if not logged in
        function showGuestUser() {
            const userName = document.getElementById('userName');
            const userStatus = document.getElementById('userStatus');
            const userIcon = document.getElementById('userIcon');

            userName.textContent = 'Guest';
            userStatus.textContent = 'Sign In';
            userIcon.textContent = '?';

            // Make profile clickable to go to login
            const userProfile = document.getElementById('userProfile');
            userProfile.style.cursor = 'pointer';
            userProfile.addEventListener('click', () => {
                window.location.href = '/login';
            });
        }

        // Load user data on sidebar load
        loadUserData();

        // Add logout functionality (optional)
        document.getElementById('userProfile').addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (confirm('Do you want to logout?')) {
                localStorage.removeItem('session_id');
                localStorage.removeItem('access_token');
                localStorage.removeItem('user_data');
                window.location.href = '/login';
            }
        });
    })();
</script>
